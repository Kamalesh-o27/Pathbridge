<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Career Assessment – PathBridge</title>
  <meta name="description" content="Take the PathBridge career assessment quiz to discover the best career paths, courses, and colleges based on your interests." />
  <link rel="icon" type="image/png" href="favicon.png" />
  <link rel="stylesheet" href="tailwind-enhanced.css" />
  <link rel="stylesheet" href="tailwind-extended.css" />
</head>
<body>

<nav class="navbar">
  <a class="navbar-brand" href="index.html">PathBridge</a>
  <div class="navbar-links">
    <a href="index.html">← Home</a>
    <a href="career-dreamer.html">Career Dreamer</a>
  </div>
</nav>

<div class="page-wrap" style="padding-top: 80px;">
  <div class="card-glass" id="quizCard">

    <div class="quiz-header">
      <span class="section-badge">📝 Step 1 of 1 – Assessment</span>
      <h2 class="section-title" style="margin-top:12px;">Career Assessment Quiz</h2>
      <p class="text-muted">Answer honestly — the more specific you are, the better your results!</p>

      <div class="progress-bar-wrap">
        <div class="progress-bar-fill" id="progressBar" style="width: 0%;"></div>
      </div>
      <p class="text-muted" id="progressLabel">0 of 7 answered</p>
    </div>

    <form id="quizForm" onsubmit="return false;">

      <!-- Q1 -->
      <div class="question-block">
        <label><span class="q-num">1</span> What type of activities do you enjoy most?</label>
        <div class="radio-group" id="q-interest">
          <label class="radio-option"><input type="radio" name="interest" value="tech" /> 💻 Working with computers & technology</label>
          <label class="radio-option"><input type="radio" name="interest" value="creative" /> 🎨 Drawing, designing, content creation</label>
          <label class="radio-option"><input type="radio" name="interest" value="business" /> 📈 Selling, managing, leading teams</label>
          <label class="radio-option"><input type="radio" name="interest" value="practical" /> 🔧 Repairing, building, hands-on work</label>
          <label class="radio-option"><input type="radio" name="interest" value="social" /> 🤝 Helping people, teaching, counselling</label>
        </div>
      </div>

      <!-- Q2 -->
      <div class="question-block">
        <label><span class="q-num">2</span> Which subjects did you enjoy or score well in?</label>
        <div class="radio-group" id="q-subject">
          <label class="radio-option"><input type="radio" name="subject" value="science" /> 🔬 Physics, Chemistry, Biology</label>
          <label class="radio-option"><input type="radio" name="subject" value="maths" /> 📐 Maths & Computer Science</label>
          <label class="radio-option"><input type="radio" name="subject" value="commerce" /> 💰 Commerce, Economics, Accountancy</label>
          <label class="radio-option"><input type="radio" name="subject" value="arts" /> 🎭 Arts, History, Literature</label>
          <label class="radio-option"><input type="radio" name="subject" value="vocational" /> 🛠️ Vocational / ITI subjects</label>
        </div>
      </div>

      <!-- Q3 -->
      <div class="question-block">
        <label><span class="q-num">3</span> What work environment do you prefer?</label>
        <div class="radio-group" id="q-environment">
          <label class="radio-option"><input type="radio" name="environment" value="office" /> 🏢 Office / Corporate setting</label>
          <label class="radio-option"><input type="radio" name="environment" value="field" /> 🌿 Outdoor / Field work</label>
          <label class="radio-option"><input type="radio" name="environment" value="independent" /> 🏠 Self-employed / Freelance</label>
          <label class="radio-option"><input type="radio" name="environment" value="lab" /> 🔬 Research lab / Technical facility</label>
        </div>
      </div>

      <!-- Q4 -->
      <div class="question-block">
        <label><span class="q-num">4</span> How many years are you willing to study?</label>
        <div class="radio-group" id="q-study">
          <label class="radio-option"><input type="radio" name="study" value="1-2" /> 📆 1–2 years (Diploma, Certificate)</label>
          <label class="radio-option"><input type="radio" name="study" value="3-4" /> 📆 3–4 years (Bachelor's Degree)</label>
          <label class="radio-option"><input type="radio" name="study" value="5+" /> 📆 5+ years (PG, Professional degrees)</label>
        </div>
      </div>

      <!-- Q5 -->
      <div class="question-block">
        <label><span class="q-num">5</span> Do you prefer stable income or high-risk high-reward?</label>
        <div class="radio-group" id="q-risk">
          <label class="radio-option"><input type="radio" name="risk" value="stable" /> 🛡️ Stable salary, job security</label>
          <label class="radio-option"><input type="radio" name="risk" value="risk" /> 🚀 High risk, high reward / startup</label>
          <label class="radio-option"><input type="radio" name="risk" value="balanced" /> ⚖️ Balanced — moderate growth</label>
        </div>
      </div>

      <!-- Q6 -->
      <div class="question-block">
        <label><span class="q-num">6</span> Are you interested in a government job?</label>
        <div class="radio-group" id="q-govt">
          <label class="radio-option"><input type="radio" name="govt" value="yes" /> ✅ Yes, government job is my goal</label>
          <label class="radio-option"><input type="radio" name="govt" value="no" /> ❌ No, I prefer private sector</label>
          <label class="radio-option"><input type="radio" name="govt" value="open" /> 🤔 Open to both</label>
        </div>
      </div>

      <!-- Q7 -->
      <div class="question-block">
        <label><span class="q-num">7</span> What is your primary goal after studies?</label>
        <div class="radio-group" id="q-goal">
          <label class="radio-option"><input type="radio" name="goal" value="job" /> 💼 Get a good-paying job quickly</label>
          <label class="radio-option"><input type="radio" name="goal" value="business" /> 🏪 Start my own business</label>
          <label class="radio-option"><input type="radio" name="goal" value="research" /> 🔭 Do research / higher studies</label>
          <label class="radio-option"><input type="radio" name="goal" value="social" /> 🌍 Serve society (NGO, teaching, etc.)</label>
        </div>
      </div>

      <button class="btn btn-primary btn-lg btn-full" onclick="submitQuiz()" id="submitBtn">
        Get My Career Path →
      </button>
    </form>

  </div>

  <footer class="site-footer">
    <div class="footer-card">
      <p>Finish the quiz or explore career roadmaps if you want inspiration.</p>
      <div class="footer-actions">
        <a href="index.html" class="btn btn-outline">🏠 Home</a>
        <a href="career-dreamer.html" class="btn btn-primary">View Career Dreamer</a>
      </div>
    </div>
  </footer>
</div>

<script>
  // Track progress
  const totalQ = 7;
  const names = ['interest','subject','environment','study','risk','govt','goal'];

  function updateProgress() {
    let answered = 0;
    names.forEach(n => {
      if (document.querySelector(`input[name="${n}"]:checked`)) answered++;
    });
    const pct = Math.round((answered / totalQ) * 100);
    document.getElementById('progressBar').style.width = pct + '%';
    document.getElementById('progressLabel').textContent = `${answered} of ${totalQ} answered`;
  }

  // Highlight selected radio options
  document.addEventListener('change', function(e) {
    if (e.target.type === 'radio') {
      const group = e.target.closest('.radio-group');
      group.querySelectorAll('.radio-option').forEach(o => o.classList.remove('selected'));
      e.target.closest('.radio-option').classList.add('selected');
      updateProgress();
    }
  });

  function submitQuiz() {
    const data = {};
    let allAnswered = true;
    names.forEach(n => {
      const val = document.querySelector(`input[name="${n}"]:checked`);
      if (val) data[n] = val.value;
      else allAnswered = false;
    });

    if (!allAnswered) {
      alert('Please answer all 7 questions before continuing.');
      return;
    }

    localStorage.setItem('careerData', JSON.stringify(data));
    window.location.href = 'result.html';
  }
</script>

<!-- Chatbot Panel -->
<div id="chatbotPanel" class="chatbot-panel hidden">
  <div class="chatbot-header">
    <div class="chatbot-title">Career Advisor</div>
    <button id="chatbotClose" class="chatbot-close-btn" aria-label="Close chatbot">✕</button>
  </div>
  <div id="chatbotMessages" class="chatbot-messages"></div>
  <form id="chatbotForm" class="chatbot-form">
    <input 
      id="chatbotInput" 
      type="text" 
      class="chatbot-input" 
      placeholder="Ask about resume, interview prep, skills..." 
      autocomplete="off"
    />
    <button type="submit" class="chatbot-send-btn" aria-label="Send message">⬆</button>
  </form>
</div>

<!-- Chatbot Toggle Button -->
<button id="chatbotToggle" class="chatbot-toggle" aria-label="Open chatbot">
  💬
</button>

<script src="chatbot (1).js"></script>
</body>
</html>
